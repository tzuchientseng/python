<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待辦事項清單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
    <style>
        .container {
            margin-top: 50px;
        }
        .todo-container, .completed-container {
            min-height: 200px;
            height: auto;
            max-height: 520px;
            overflow-y: auto;
        }
        .blue-background-class {
            background-color: #f0f0f0 !important;
        }
        .custom-mt {
            margin-top: 4rem; /* Custom top margin */
        }
    </style>
</head>
<body class="bg-dark"> 
<h1 class="display-1 text-white text-center custom-mt">待辦事項清單</h1>

<div class="container">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-center">
            <input type="text" id="username" class="form-control w-50" placeholder="輸入你的 ID (e.g. 名字+生日...)" required>
            <button class="btn btn-primary ms-2" id="load-tasks">登入</button>
        </div>
    </div>

    <div class="d-flex justify-content-center">
        <div class="col-md-6 d-flex justify-content-center">
            <div class="card flex-grow-1">
                <div class="card-header bg-primary text-white">
                    未完成
                </div>
                <div class="card-body todo-container">
                    <ul class="list-group" id="todo-list">
                        <!-- 待辦事項將顯示在這裡 -->
                    </ul>
                </div>
                <div class="card-footer">
                    <button class="btn btn-success w-100" id="add-task">新增任務</button>
                </div>
            </div>
        </div>
-
        <div class="col-md-6 d-flex justify-content-center">
            <div class="card flex-grow-1">
                <div class="card-header bg-success text-white">
                    已完成
                </div>
                <div class="card-body completed-container">
                    <ul class="list-group" id="completed-list">
                        <!-- 已完成事項將顯示在這裡 -->
                    </ul>
                </div>
                <div class="card-footer">
                    <button class="btn btn-danger w-100" id="clear-completed">清空事項</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12 d-flex justify-content-center">
            <button class="btn btn-outline-warning w-25 mt-5" id="save-tasks">保存任務</button>
            <button class="btn btn-outline-danger w-25 mt-5 ms-3" id="clear-data">清除資料</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loadTasksButton = document.getElementById('load-tasks');
    loadTasksButton.addEventListener('click', function() {
        Swal.fire({
            title: '登入中...',
            text: '請稍候...',
            timer: 1000, 
            timerProgressBar: true,
            didOpen: () => {
                Swal.showLoading();  // 顯示加載動畫
            },
            willClose: () => {
                loadTasks();  // 在提示框關閉後呼叫 loadTasks 函數
            }
        });
    });

    function loadTasks() {
        const usernameInput = document.getElementById('username');
        const username = usernameInput.value.trim();

        // 檢查用戶是否輸入 "drop json"
        if (username.toLowerCase() === 'drop json') {
            Swal.fire({
                title: '警告',
                text: "這將刪除所有 JSON 資料。確定要這麼做嗎？",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff0000', // 紅色按鈕警告
                cancelButtonColor: '#aaa',
                confirmButtonText: '是的，刪除它！'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch('/drop-json', {  // 發送請求刪除所有 JSON 資料
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    }).then(response => response.json())
                    .then(data => {
                        Swal.fire({
                            icon: 'success',
                            title: '資料已刪除',
                            text: '所有 JSON 資料已刪除！',
                            confirmButtonColor: '#ff9800'
                        }).then(() => {
                            location.reload();  // 重新載入頁面
                        });
                    }).catch(error => {
                        Swal.fire({
                            icon: 'error',
                            title: '刪除失敗',
                            text: '無法刪除 JSON 資料。請稍後再試。',
                            confirmButtonColor: '#ff9800'
                        });
                    });
                }
            });
            return;  // 防止進一步加載任務
        }

        // 原有的任務加載邏輯
        fetch(`/get-tasks?username=${encodeURIComponent(username)}`)
            .then(response => response.json())
            .then(data => {
                const todoList = document.getElementById('todo-list');
                const completedList = document.getElementById('completed-list');
                todoList.innerHTML = '';
                completedList.innerHTML = '';

                data.todos.forEach(taskText => {
                    const newTask = createTaskElement(taskText, false);
                    todoList.appendChild(newTask);
                });

                data.completed.forEach(taskText => {
                    const newTask = createTaskElement(taskText, true);
                    completedList.appendChild(newTask);
                });
            })
            .catch(error => {
                console.error('加載任務時出錯:', error);
                Swal.fire({
                    icon: 'error',
                    title: '加載任務時出錯！',
                    text: error.message,
                    confirmButtonColor: '#ff9800'
                });
            });
    }

    document.getElementById('add-task').addEventListener('click', function () {
        Swal.fire({
            title: '新增一個新任務',
            input: 'text',
            inputPlaceholder: '輸入您的任務...',
            showCancelButton: true,
            confirmButtonText: '新增',
            cancelButtonText: '取消',
            confirmButtonColor: '#ff9800',
            cancelButtonColor: '#aaa',
            inputValidator: (value) => {
                if (!value) {
                    return '任務不能為空！';
                }
            }
        }).then((result) => {
            if (result.isConfirmed) {
                const taskText = result.value.trim();
                if (taskText) {
                    const todoList = document.getElementById('todo-list');
                    const newTask = createTaskElement(taskText, false);
                    todoList.prepend(newTask);
                }
            }
        });
    });

    function createTaskElement(taskText, isCompleted) {
        const newTask = document.createElement('li');
        newTask.className = 'list-group-item d-flex justify-content-between align-items-center';
        newTask.textContent = taskText;

        newTask.addEventListener('dblclick', function () {
            editTask(newTask);
        });

        if (isCompleted) {
            const cancelButton = document.createElement('button');
            cancelButton.className = 'btn btn-sm btn-outline-danger';
            cancelButton.textContent = '取消';
            cancelButton.addEventListener('click', function () {
                cancelTask(newTask);
            });
            newTask.appendChild(cancelButton);
        } else {
            const completeButton = document.createElement('button');
            completeButton.className = 'btn btn-sm btn-outline-success';
            completeButton.textContent = '完成';
            completeButton.addEventListener('click', function () {
                completeTask(newTask);
            });
            newTask.appendChild(completeButton);
        }

        return newTask;
    }

    function completeTask(task) {
        const completedList = document.getElementById('completed-list');
        completedList.prepend(task);
        task.querySelector('button').remove();

        const cancelButton = document.createElement('button');
        cancelButton.className = 'btn btn-sm btn-outline-danger';
        cancelButton.textContent = '取消';
        cancelButton.addEventListener('click', function () {
            cancelTask(task);
        });
        task.appendChild(cancelButton);
    }

    function cancelTask(task) {
        const todoList = document.getElementById('todo-list');
        task.querySelector('button').remove();
        const completeButton = document.createElement('button');
        completeButton.className = 'btn btn-sm btn-outline-success';
        completeButton.textContent = '完成';
        completeButton.addEventListener('click', function () {
            completeTask(task);
        });
        task.appendChild(completeButton);
        todoList.prepend(task);
    }

    function editTask(task) {
        const originalText = task.childNodes[0].textContent.trim();
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'form-control';
        input.value = originalText;
        task.innerHTML = '';

        const buttons = document.createElement('div');
        buttons.className = 'd-flex justify-content-end';

        task.appendChild(input);
        task.appendChild(buttons);

        input.focus();

        input.addEventListener('blur', function () {
            saveEdit(task, input.value);
        });

        input.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                saveEdit(task, input.value);
            }
        });
    }

    function saveEdit(task, newValue) {
        task.innerHTML = newValue;
        task.className = 'list-group-item d-flex justify-content-between align-items-center';

        const isCompleted = task.closest('#completed-list') !== null;

        if (isCompleted) {
            const cancelButton = document.createElement('button');
            cancelButton.className = 'btn btn-sm btn-outline-danger';
            cancelButton.textContent = '取消';
            cancelButton.addEventListener('click', function () {
                cancelTask(task);
            });
            task.appendChild(cancelButton);
        } else {
            const completeButton = document.createElement('button');
            completeButton.className = 'btn btn-sm btn-outline-success';
            completeButton.textContent = '完成';
            completeButton.addEventListener('click', function () {
                completeTask(task);
            });
            task.appendChild(completeButton);
        }

        task.addEventListener('dblclick', function () {
            editTask(task);
        });
    }

    document.getElementById('save-tasks').addEventListener('click', function () {
        const usernameInput = document.getElementById('username');
        const username = usernameInput.value.trim();
        if (!username) {
            Swal.fire({
                icon: 'warning',
                title: '請輸入您的名字！',
                confirmButtonColor: '#ff9800'
            });
            return;
        }

        const todoItems = [];
        document.querySelectorAll('#todo-list li').forEach(function (li) {
            todoItems.push(li.textContent.replace('完成', '').trim());
        });

        const completedItems = [];
        document.querySelectorAll('#completed-list li').forEach(function (li) {
            completedItems.push(li.textContent.replace('取消', '').trim());
        });

        const data = {
            username: username,
            todos: todoItems,
            completed: completedItems
        };

        fetch('/save-tasks', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        }).then(response => response.json())
        .then(data => {
            Swal.fire({
                icon: 'success',
                title: '保存成功',
                text: '您的任務已成功保存！',
                confirmButtonColor: '#ff9800'
            });
        }).catch(error => {
            Swal.fire({
                icon: 'error',
                title: '保存失敗',
                text: '無法保存您的任務，請稍後再試。',
                confirmButtonColor: '#ff9800'
            });
        });
    });

    document.getElementById('clear-data').addEventListener('click', function () {
        const usernameInput = document.getElementById('username');
        const username = usernameInput.value.trim();
        if (!username) {
            Swal.fire({
                icon: 'warning',
                title: '請輸入您的名字！',
                confirmButtonColor: '#ff9800'
            });
            return;
        }

        Swal.fire({
            title: '您確定嗎？',
            text: "這將刪除所有任務！",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff9800',
            cancelButtonColor: '#aaa',
            confirmButtonText: '是的，刪除它！'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch('/clear-tasks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: username })
                }).then(response => response.json())
                .then(data => {
                    Swal.fire({
                        icon: 'success',
                        title: '資料已清除',
                        text: '所有任務已被刪除！',
                        confirmButtonColor: '#ff9800'
                    }).then(() => {
                        location.reload();
                    });
                }).catch(error => {
                    Swal.fire({
                        icon: 'error',
                        title: '清除失敗',
                        text: '無法清除任務，請稍後再試。',
                        confirmButtonColor: '#ff9800'
                    });
                });
            }
        });
    });

    // 清空已完成的任務
    document.getElementById('clear-completed').addEventListener('click', function () {
        const completedList = document.getElementById('completed-list');
        completedList.innerHTML = '';  // 清空已完成事項列表
    });

    // 啟用 SortableJS 並設置為同一組 group，以支援跨容器拖曳
    new Sortable(document.getElementById('todo-list'), {
        group: 'shared', // 設定為同一個 group，允許這兩個列表之間進行拖曳
        animation: 150,  // 拖曳動畫時間，單位為毫秒
        ghostClass: 'blue-background-class', // 拖曳時，所拖曳項目的佔位符背景色
        onEnd: function (evt) {  // 當拖曳操作結束時觸發的事件回調
            if (evt.to.id === 'completed-list') {  // 檢查項目是否被移動到 "已完成事項" 列表中
                const task = evt.item;  // 獲取被拖曳的項目
                task.querySelector('button').remove(); // 移除該項目中的 "完成" 按鈕
                const cancelButton = document.createElement('button'); // 創建一個新的 "取消" 按鈕
                cancelButton.className = 'btn btn-sm btn-outline-danger'; // 設定 "取消" 按鈕的樣式
                cancelButton.textContent = '取消';  // 設定按鈕文字為 "取消"
                cancelButton.addEventListener('click', function () {  // 為 "取消" 按鈕添加點擊事件
                    cancelTask(task);  // 點擊 "取消" 按鈕時，呼叫 `cancelTask` 函數將任務移回 "待辦事項" 列表
                });
                task.appendChild(cancelButton);  // 將 "取消" 按鈕添加到被拖曳的項目中
            }
        }
    });

    new Sortable(document.getElementById('completed-list'), {
        group: 'shared', // 設定為同一個 group，允許這兩個列表之間進行拖曳
        animation: 150,  // 拖曳動畫時間，單位為毫秒
        ghostClass: 'blue-background-class', // 拖曳時，所拖曳項目的佔位符背景色
        onEnd: function (evt) {  // 當拖曳操作結束時觸發的事件回調
            if (evt.to.id === 'todo-list') {  // 檢查項目是否被移動到 "待辦事項" 列表中
                const task = evt.item;  // 獲取被拖曳的項目
                task.querySelector('button').remove(); // 移除該項目中的 "取消" 按鈕
                const completeButton = document.createElement('button'); // 創建一個新的 "完成" 按鈕
                completeButton.className = 'btn btn-sm btn-outline-success'; // 設定 "完成" 按鈕的樣式
                completeButton.textContent = '完成';  // 設定按鈕文字為 "完成"
                completeButton.addEventListener('click', function () {  // 為 "完成" 按鈕添加點擊事件
                    completeTask(task);  // 點擊 "完成" 按鈕時，呼叫 `completeTask` 函數將任務移到 "已完成事項" 列表
                });
                task.appendChild(completeButton);  // 將 "完成" 按鈕添加到被拖曳的項目中
            }
        }
    });
});
</script>

</body>
</html>
