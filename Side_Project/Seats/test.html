<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位劃位系統</title>
    <style>
        #seat-container {
            width: 500px;
            height: 500px;
            border: 1px solid #000;
            position: relative;
            margin-bottom: 20px;
        }
        #new-seat {
            width: 100px;
            height: 50px;
            background-color: lightgreen;
            text-align: center;
            line-height: 50px;
            cursor: grab;
        }
        .seat {
            width: 50px;
            height: 50px;
            background-color: lightblue;
            position: absolute;
            text-align: center;
            line-height: 50px;
        }
        .fixed {
            cursor: not-allowed;
        }
        #history-list {
            margin-top: 20px;
        }
        #history-list div {
            cursor: pointer;
            margin: 5px 0;
            padding: 5px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
        #history-list div:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div id="new-seat" draggable="true">新增座位</div>
    <div id="seat-container"></div>
    <input type="text" id="seating-chart-name" placeholder="輸入座位表名稱">
    <button id="save-seating-chart">存取座位表</button>
    <button id="toggle-mode">固定</button>
    <button id="reset-seats">重設座位</button>
    <div id="history-list"></div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const seatContainer = document.getElementById('seat-container');
        const toggleModeButton = document.getElementById('toggle-mode');
        const resetSeatsButton = document.getElementById('reset-seats');
        const saveSeatingChartButton = document.getElementById('save-seating-chart');
        const seatingChartNameInput = document.getElementById('seating-chart-name');
        const historyList = document.getElementById('history-list');
        const newSeat = document.getElementById('new-seat');
        let seatIdCounter = 0;
        let isEditMode = true;

        seatContainer.addEventListener('dragover', (event) => {
            if (isEditMode) {
                event.preventDefault();
            }
        });

        seatContainer.addEventListener('drop', (event) => {
            if (isEditMode) {
                event.preventDefault();
                const seatId = event.dataTransfer.getData('text/plain');

                if (seatId === "new") {
                    seatIdCounter++;
                    const x = event.pageX - seatContainer.offsetLeft - 25;
                    const y = event.pageY - seatContainer.offsetTop - 25;
                    createSeat(seatIdCounter, x, y);
                } else {
                    const seat = document.querySelector(`[data-seat-id="${seatId}"]`);
                    const newX = event.pageX - seatContainer.offsetLeft - seat.offsetWidth / 2;
                    const newY = event.pageY - seatContainer.offsetTop - seat.offsetHeight / 2;
                    seat.style.left = `${newX}px`;
                    seat.style.top = `${newY}px`;
                    updateSeatPosition(seatId, newX, newY);
                }
            }
        });

        newSeat.addEventListener('dragstart', (event) => {
            if (isEditMode) {
                event.dataTransfer.setData('text/plain', 'new');
            }
        });

        async function createSeat(seatId, x, y) {
            const seat = document.createElement('div');
            seat.className = 'seat';
            seat.textContent = seatId;
            seat.style.left = `${x}px`;
            seat.style.top = `${y}px`;
            seat.draggable = isEditMode;
            seat.dataset.seatId = seatId;

            seat.addEventListener('dragstart', (event) => {
                if (isEditMode) {
                    event.dataTransfer.setData('text/plain', seatId);
                }
            });

            seatContainer.appendChild(seat);

            await fetch('http://127.0.0.1:5000/api/seats', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ seat_id: seatId, position_x: x, position_y: y })
            });
        }

        async function updateSeatPosition(seatId, x, y) {
            const response = await fetch(`http://127.0.0.1:5000/api/seats/${seatId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ position_x: x, position_y: y })
            });

            if (!response.ok) {
                console.error('更新座位位置失敗');
            }
        }

        toggleModeButton.addEventListener('click', () => {
            isEditMode = !isEditMode;
            toggleModeButton.textContent = isEditMode ? '固定' : '編輯';

            const seats = document.querySelectorAll('.seat');
            seats.forEach(seat => {
                seat.draggable = isEditMode;
                seat.classList.toggle('fixed', !isEditMode);
            });

            newSeat.draggable = isEditMode;
            newSeat.classList.toggle('fixed', !isEditMode);
        });

        resetSeatsButton.addEventListener('click', async () => {
            seatContainer.innerHTML = '';  
            seatIdCounter = 0;

            await fetch('http://127.0.0.1:5000/api/seats', {
                method: 'DELETE'
            });
        });

        saveSeatingChartButton.addEventListener('click', async () => {
            const seatingChartName = seatingChartNameInput.value.trim();
            if (seatingChartName) {
                const seats = document.querySelectorAll('.seat');
                const seatPositions = [];
                seats.forEach(seat => {
                    seatPositions.push({
                        seat_id: seat.dataset.seatId,
                        position_x: parseInt(seat.style.left),
                        position_y: parseInt(seat.style.top)
                    });
                });

                await fetch('http://127.0.0.1:5000/api/seating-charts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: seatingChartName, seats: seatPositions })
                });

                updateHistoryList();
                seatingChartNameInput.value = '';
            }
        });

        async function updateHistoryList() {
            const response = await fetch('http://127.0.0.1:5000/api/seating-charts');
            const chartNames = await response.json();

            historyList.innerHTML = '';
            chartNames.forEach(name => {
                const historyItem = document.createElement('div');
                historyItem.textContent = name;
                historyItem.addEventListener('click', () => loadSeatingChart(name));
                historyList.appendChild(historyItem);
            });
            console.log(chartNames);

        }

        async function loadSeatingChart(chartName) {
            const response = await fetch(`http://127.0.0.1:5000/api/seating-charts/${chartName}`);
            const seatPositions = await response.json();

            seatContainer.innerHTML = '';
            seatPositions.forEach(pos => {
                createSeat(pos.seat_id, pos.position_x, pos.position_y);
            });
        }

        updateHistoryList();  // 頁面加載時獲取歷史紀錄
    });
    </script>
</body>
</html>
