<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
    <style>
        .container {
            margin-top: 50px;
        }
        .todo-container, .completed-container {
            min-height: 200px;
            height: auto;
            max-height: 520px;
            overflow-y: auto;
        }
        .blue-background-class {
            background-color: #f0f0f0 !important;
        }
    </style>
</head>
<body class="bg-dark"> 
<h1 class="display-1 text-white text-center mt-4">To-do list</h1>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        To-do List
                    </div>
                    <div class="card-body todo-container">
                        <ul class="list-group" id="todo-list">
                            <!-- To-do items will be displayed here -->
                        </ul>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-success w-100" id="add-task">Add Task</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        Completed Tasks
                    </div>
                    <div class="card-body completed-container">
                        <ul class="list-group" id="completed-list">
                            <!-- Completed items will be displayed here -->
                        </ul>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-danger w-100" id="clear-completed">Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 d-flex justify-content-center">
                <button class="btn btn-outline-warning w-25 mt-5" id="save-tasks">Save</button>
                <button class="btn btn-outline-danger w-25 mt-5 ms-3" id="clear-data">Clear</button>

            </div>
        </div>
        <div class="row">
            <div class="mt-2 col-12 d-flex justify-content-center">
                <button class="btn btn-outline-secondary ms-3" id="save-online">Archive Online</button>
                <button class="btn btn-outline-secondary ms-3" id="download-online">Download Online</button>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Focus on "Add Task" button
            const addTaskButton = document.getElementById('add-task');
            addTaskButton.focus();

            // Add event listener for Enter key
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    addTaskButton.click();
                }
            });
        });
        

        document.addEventListener('DOMContentLoaded', function() {
            const addTaskButton = document.getElementById('add-task');
            addTaskButton.focus();

            // 從後端獲取現有的待辦事項和已完成事項
            fetch('http://127.0.0.1:7777/get-tasks')
                .then(response => response.json())
                .then(data => {
                    const todoList = document.getElementById('todo-list');
                    const completedList = document.getElementById('completed-list');

                    // 添加待辦事項到列表中
                    data.todos.forEach(taskText => {
                        const newTask = createTaskElement(taskText, false);
                        todoList.appendChild(newTask);
                    });

                    // 添加已完成事項到列表中
                    data.completed.forEach(taskText => {
                        const newTask = createTaskElement(taskText, true);
                        completedList.appendChild(newTask);
                    });
                })
                .catch(error => {
                    console.error('Error fetching tasks:', error);
                });
        });

        // document.getElementById('add-task').addEventListener('click', function () {
        //     const taskInput = document.getElementById('new-task');
        //     const taskText = taskInput.value.trim();
        //     if (taskText) {
        //         const todoList = document.getElementById('todo-list');
        //         const newTask = document.createElement('li');
        //         newTask.className = 'list-group-item d-flex justify-content-between align-items-center';
        //         newTask.textContent = taskText;

        //         const completeButton = document.createElement('button');
        //         completeButton.className = 'btn btn-sm btn-outline-success';
        //         completeButton.textContent = '完成';
        //         completeButton.addEventListener('click', function () {
        //             completeTask(newTask);
        //         });

        //         newTask.appendChild(completeButton);
        //         todoList.prepend(newTask);
        //         taskInput.value = '';
        //     }
        // });
        document.getElementById('add-task').addEventListener('click', function () {
            Swal.fire({
                title: 'Add a new task',
                input: 'text',
                inputPlaceholder: 'Enter your task...',
                showCancelButton: true,
                confirmButtonText: 'Add',
                cancelButtonText: 'Cancel',
                confirmButtonColor: '#ff9800',  // 橘色確認按鈕
                cancelButtonColor: '#aaa',  // 灰色取消按鈕
                inputValidator: (value) => {
                    if (!value) {
                        return 'Task cannot be empty!';
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const taskText = result.value.trim();
                    if (taskText) {
                        const todoList = document.getElementById('todo-list');
                        const newTask = createTaskElement(taskText, false);
                        todoList.prepend(newTask);
                    }
                }
            });
        });

        function completeTask(task) {
            const completedList = document.getElementById('completed-list');
            completedList.prepend(task);
            task.querySelector('button').remove();

            // 添加取消按鈕
            const cancelButton = document.createElement('button');
            cancelButton.className = 'btn btn-sm btn-outline-danger';
            cancelButton.textContent = 'Cancel';
            cancelButton.addEventListener('click', function () {
                cancelTask(task);
            });
            task.appendChild(cancelButton);
        }

        function cancelTask(task) {
            const todoList = document.getElementById('todo-list');
            task.querySelector('button').remove(); // 移除取消按鈕
            const completeButton = document.createElement('button');
            completeButton.className = 'btn btn-sm btn-outline-success';
            completeButton.textContent = 'Complete';
            completeButton.addEventListener('click', function () {
                completeTask(task);
            });
            task.appendChild(completeButton);
            todoList.prepend(task); // 將任務移回待辦事項
        }

// 雙擊編輯功能
        function createTaskElement(taskText, isCompleted) {
            const newTask = document.createElement('li');
            newTask.className = 'list-group-item d-flex justify-content-between align-items-center';
            newTask.textContent = taskText;

            newTask.addEventListener('dblclick', function () {
                editTask(newTask);
            });

            if (isCompleted) {
                const cancelButton = document.createElement('button');
                cancelButton.className = 'btn btn-sm btn-outline-danger';
                cancelButton.textContent = 'Cancel';
                cancelButton.addEventListener('click', function () {
                    cancelTask(newTask);
                });
                newTask.appendChild(cancelButton);
            } else {
                const completeButton = document.createElement('button');
                completeButton.className = 'btn btn-sm btn-outline-success';
                completeButton.textContent = 'Complete';
                completeButton.addEventListener('click', function () {
                    completeTask(newTask);
                });
                newTask.appendChild(completeButton);
            }

            return newTask;
        }

        function editTask(task) {
            const originalText = task.childNodes[0].textContent.trim();  // 存取遠本文字內容
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'form-control';
            input.value = originalText;
            task.innerHTML = '';  // 清空 li 內容，但保留原本的按鈕

            const buttons = document.createElement('div'); // 創建一個div來保存按鈕
            buttons.className = 'd-flex justify-content-end';

            task.appendChild(input);
            task.appendChild(buttons);  // 先將div添加到li中

            input.focus();

            input.addEventListener('blur', function () {
                saveEdit(task, input.value);
            });

            input.addEventListener('keydown', function (event) {
                if (event.key === 'Enter') {
                    saveEdit(task, input.value);
                }
            });
        }

        function saveEdit(task, newValue) {
            task.innerHTML = newValue;  // 更新 li 內容
            task.className = 'list-group-item d-flex justify-content-between align-items-center';
            
            const isCompleted = task.closest('#completed-list') !== null;

            if (isCompleted) {
                const cancelButton = document.createElement('button');
                cancelButton.className = 'btn btn-sm btn-outline-danger';
                cancelButton.textContent = 'Cancel';
                cancelButton.addEventListener('click', function () {
                    cancelTask(task);
                });
                task.appendChild(cancelButton);
            } else {
                const completeButton = document.createElement('button');
                completeButton.className = 'btn btn-sm btn-outline-success';
                completeButton.textContent = 'Complete';
                completeButton.addEventListener('click', function () {
                    completeTask(task);
                });
                task.appendChild(completeButton);
            }

            task.addEventListener('dblclick', function () {
                editTask(task);
            });
        }

//以上為雙擊功能添加           

        // 清空已完成事項列表
        document.getElementById('clear-completed').addEventListener('click', function () {
            const completedList = document.getElementById('completed-list');
            completedList.innerHTML = ''; // 清空列表中的所有項目
        });

        // 清除資料庫
        document.getElementById('clear-data').addEventListener('click', function () {
            Swal.fire({
                title: 'Are you sure?',
                text: "This will delete all tasks!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Yes, delete it!'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch('http://127.0.0.1:7777/clear-tasks', {  // 更改為正確的伺服器地址和端口
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    }).then(response => response.json())
                    .then(data => {
                        Swal.fire({
                            icon: 'success',
                            title: 'Data cleared',
                            text: 'All tasks have been deleted!'
                        }).then(() => {
                            location.reload();  // 刷新頁面
                        });
                    }).catch(error => {
                        Swal.fire({
                            icon: 'error',
                            title: 'Failed to clear data',
                            text: 'Unable to clear tasks, please try again later.'
                        });
                    });
                }
            });
        });

        // 啟用 SortableJS 並設置為同一組 group，以支援跨容器拖曳
        new Sortable(document.getElementById('todo-list'), {
            group: 'shared', // 設定為同一個 group，允許這兩個列表之間進行拖曳
            animation: 150,  // 拖曳動畫時間，單位為毫秒
            ghostClass: 'blue-background-class', // 拖曳時，所拖曳項目的佔位符背景色
            onEnd: function (evt) {  // 當拖曳操作結束時觸發的事件回調
                if (evt.to.id === 'completed-list') {  // 檢查項目是否被移動到 "已完成事項" 列表中
                    const task = evt.item;  // 獲取被拖曳的項目
                    task.querySelector('button').remove(); // 移除該項目中的 "完成" 按鈕
                    const cancelButton = document.createElement('button'); // 創建一個新的 "取消" 按鈕
                    cancelButton.className = 'btn btn-sm btn-outline-danger'; // 設定 "取消" 按鈕的樣式
                    cancelButton.textContent = 'Cancel';  // 設定按鈕文字為 "取消"
                    cancelButton.addEventListener('click', function () {  // 為 "取消" 按鈕添加點擊事件
                        cancelTask(task);  // 點擊 "取消" 按鈕時，呼叫 `cancelTask` 函數將任務移回 "待辦事項" 列表
                    });
                    task.appendChild(cancelButton);  // 將 "取消" 按鈕添加到被拖曳的項目中
                }
            }
        });

        new Sortable(document.getElementById('completed-list'), {
            group: 'shared', // 設定為同一個 group，允許這兩個列表之間進行拖曳
            animation: 150,  // 拖曳動畫時間，單位為毫秒
            ghostClass: 'blue-background-class', // 拖曳時，所拖曳項目的佔位符背景色
            onEnd: function (evt) {  // 當拖曳操作結束時觸發的事件回調
                if (evt.to.id === 'todo-list') {  // 檢查項目是否被移動到 "待辦事項" 列表中
                    const task = evt.item;  // 獲取被拖曳的項目
                    task.querySelector('button').remove(); // 移除該項目中的 "取消" 按鈕
                    const completeButton = document.createElement('button'); // 創建一個新的 "完成" 按鈕
                    completeButton.className = 'btn btn-sm btn-outline-success'; // 設定 "完成" 按鈕的樣式
                    completeButton.textContent = 'Complete';  // 設定按鈕文字為 "完成"
                    completeButton.addEventListener('click', function () {  // 為 "完成" 按鈕添加點擊事件
                        completeTask(task);  // 點擊 "完成" 按鈕時，呼叫 `completeTask` 函數將任務移到 "已完成事項" 列表
                    });
                    task.appendChild(completeButton);  // 將 "完成" 按鈕添加到被拖曳的項目中
                }
            }
        });

        document.getElementById('save-tasks').addEventListener('click', function () {
            // 收集待辦事項
            const todoItems = [];
            document.querySelectorAll('#todo-list li').forEach(function (li) {
                todoItems.push(li.textContent.replace('Complete', '').trim());  // 去掉按鈕文字
            });

            // 收集已完成事項
            const completedItems = [];
            document.querySelectorAll('#completed-list li').forEach(function (li) {
                completedItems.push(li.textContent.replace('Cancel', '').trim());  // 去掉按鈕文字
            });

            // 準備要發送的數據
            const data = {
                todos: todoItems,
                completed: completedItems
            };

            // 發送 POST 請求到後端
            fetch('http://127.0.0.1:7777/save-tasks', {  // 更改為正確的伺服器地址和端口
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            }).then(response => response.json())
            .then(data => {
                Swal.fire({
                    icon: 'success',
                    title: 'Save successful',
                    confirmButtonColor: '#ff9800',  // Orange confirm button
                    text: 'Your tasks have been saved successfully!'
                });
            }).catch(error => {
                Swal.fire({
                    icon: 'error',
                    title: 'Save failed',
                    text: 'Unable to save your tasks, please try again later.'
                });
            });
        });

        document.getElementById('save-online').addEventListener('click', function () {
            Swal.fire({
                title: 'Enter your name',
                input: 'text',
                inputPlaceholder: 'Enter your name...',
                showCancelButton: true,
                confirmButtonText: 'Save Online',
                cancelButtonText: 'Cancel',
                confirmButtonColor: '#ff9800',  // Orange confirm button
                cancelButtonColor: '#aaa',  // Gray cancel button
                inputValidator: (value) => {
                    if (!value) {
                        return 'Name cannot be empty!';
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const username = result.value.trim();
                    saveOnline(username);
                }
            });
        });

        function saveOnline(username) {
            const todoItems = [];
            document.querySelectorAll('#todo-list li').forEach(function (li) {
                todoItems.push(li.textContent.replace('Complete', '').trim());
            });

            const completedItems = [];
            document.querySelectorAll('#completed-list li').forEach(function (li) {
                completedItems.push(li.textContent.replace('Cancel', '').trim());
            });

            const data = {
                username: username,
                todos: todoItems,
                completed: completedItems
            };

            fetch('http://127.0.0.1:7777/save-online', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            }).then(response => response.json())
            .then(data => {
                if (data.message) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Online Save Successful',
                        text: data.message,
                        confirmButtonColor: '#ff9800',  // Orange confirm button
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Online Save Failed',
                        text: data.error || 'An unknown error occurred',
                        confirmButtonColor: '#ff9800',  // Orange confirm button
                    });
                }
            }).catch(error => {
                Swal.fire({
                    icon: 'error',
                    title: 'Online Save Failed',
                    text: 'Unable to save, please try again later.',
                    confirmButtonColor: '#ff9800',  // Orange confirm button
                });
            });
        }

        document.getElementById('download-online').addEventListener('click', function () {
            Swal.fire({
                title: 'Enter your name',
                input: 'text',
                inputPlaceholder: 'Enter your name...',
                showCancelButton: true,
                confirmButtonText: 'Download Online',
                cancelButtonText: 'Cancel',
                confirmButtonColor: '#ff9800',  // Orange confirm button
                cancelButtonColor: '#aaa',  // Gray cancel button
                inputValidator: (value) => {
                    if (!value) {
                        return 'Name cannot be empty!';
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const username = result.value.trim();
                    downloadOnline(username);
                }
            });
        });

        function downloadOnline(username) {
            fetch(`http://127.0.0.1:7777/download-online?username=${encodeURIComponent(username)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.todos && data.completed) {
                        const todoList = document.getElementById('todo-list');
                        const completedList = document.getElementById('completed-list');

                        todoList.innerHTML = '';
                        completedList.innerHTML = '';

                        data.todos.forEach(taskText => {
                            const newTask = createTaskElement(taskText, false);
                            todoList.appendChild(newTask);
                        });

                        data.completed.forEach(taskText => {
                            const newTask = createTaskElement(taskText, true);
                            completedList.appendChild(newTask);
                        });

                        Swal.fire({
                            icon: 'success',
                            title: 'Online Download Successful',
                            text: 'Your tasks have been successfully downloaded!',
                            confirmButtonColor: '#ff9800',  // Orange confirm button
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Online Download Failed',
                            text: data.error || 'An unknown error occurred',
                            confirmButtonColor: '#ff9800',  // Orange confirm button
                        });
                    }
                })
                .catch(error => {
                    Swal.fire({
                        icon: 'error',
                        title: 'Online Download Failed',
                        text: 'Unable to download, please try again later.',
                        confirmButtonColor: '#ff9800',  // Orange confirm button
                    });
                });
        }
    </script>
</body>
</html>
