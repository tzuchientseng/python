<script>
    //иЃУ "зЩїеЗЇ" жґИе§±пЉМжШѓ Javascript зЪДдЇЛ
    //иАМи¶БдЄНи¶БжґИе§±пЉМи¶Бж™ҐжЯ•жШѓеР¶жЬЙзЩїеЕ•йБО(жЬЙж≤ТжЬЙ session), йАЩжШѓ python зЪДдЇЛ
    check_session();
    function connector(url){
        if (window.XMLHttpRequest) conn=new XMLHttpRequest();//жФѓжПіеЕґеЃГзАПи¶љеЩ®
        else conn=new ActiveXObject("Microsoft.XMLHTTP");//жФѓжПіIE
        conn.open("GET",url, true);//и®≠еЃЪйА£зЈЪзЪДжЦєеЉП
        return conn;
    }
    function check_session(){
        url="/check_session/";
        conn_session=connector(url);
        conn_session.onreadystatechange=function(){
	        if (conn_session.readyState==4 && conn_session.status==200){
	            //и¶БдљЬзЪДдЇЛжГЕйГљеѓЂеЬ®йАЩи£ПйЭҐ
	            data=JSON.parse(conn_session.responseText);
	            if (data["session"]=="ok"){//жЬЙsession
                    document.getElementById("logout").style.display="flex";
	            }
	            else{//ж≤ТжЬЙsession
                    document.getElementById("logout").style.display="none";
	            }
	        }
        }
        conn_session.send();
    }
</script>
